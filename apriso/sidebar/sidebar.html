<link type="text/css" rel="stylesheet" href="[Apriso]/Scripts/FontsGranado/granado-fonts.css">

<aside class="sidebar" data-current-screen="{Screen}">


    <!-- ============ BRAND ============ -->
    <div class="sb-brand">
        <div class="sb-brand-top">
            <div class="sb-mark">G</div>
            <div>
                <div class="sb-name">Granado</div>
                <div class="sb-sub">Desde 1870</div>
            </div>
        </div>
        <div class="sb-session">
            <span>&#9679; Online</span> &middot; MES Apriso<br />
            Turno A &middot; MF5 &middot; <span>J. Santos</span>
        </div>
    </div>

    <!-- ============ NAV ============ -->
    <nav class="sb-nav">

        <!-- ===== MODULO: SINOTICO ===== -->
        <div class="sb-module" data-mod="mod-sinotico">
            <div class="sb-module-btn" data-toggle="mod-sinotico" role="button" tabindex="0">
                <div class="sb-dot"></div>
                <span class="sb-ico">&#128507;</span> Sinotico da Fabrica
                <span class="sb-arr">&rsaquo;</span>
            </div>
            <div class="sb-sub-list">
                <button type="button" class="sb-sub-item" data-flx-bind="Action" value="OPEN_SINOTICO">Sinotico</button>
            </div>
        </div>

        <!-- ===== MODULO: OEE ===== -->
        <div class="sb-module" data-mod="mod-oee">
            <div class="sb-module-btn" data-toggle="mod-oee" role="button" tabindex="0">
                <div class="sb-dot"></div>
                <span class="sb-ico">&#128202;</span> OEE Dashboard
                <span class="sb-arr">&rsaquo;</span>
            </div>
            <div class="sb-sub-list">
                <button type="button" class="sb-sub-item" data-flx-bind="Action" value="OPEN_OEE">OEE</button>
            </div>
        </div>

        <!-- ===== MODULO: PRODUCAO ===== -->
        <div class="sb-module" data-mod="mod-prod">
            <div class="sb-module-btn" data-toggle="mod-prod" role="button" tabindex="0">
                <div class="sb-dot"></div>
                <span class="sb-ico">&#127981;</span> Producao
                <span class="sb-arr">&rsaquo;</span>
            </div>
            <div class="sb-sub-list">
                <button type="button" class="sb-sub-item" data-flx-bind="Action" value="TESTE_SCREEN1">Ordens de
                    Producao</button>
            </div>
        </div>

        <!-- ===== MODULO: PESAGEM ===== -->
        <div class="sb-module" data-mod="mod-pes">
            <div class="sb-module-btn" data-toggle="mod-pes" role="button" tabindex="0">
                <div class="sb-dot"></div>
                <span class="sb-ico">&#9878;</span> Pesagem
                <span class="sb-arr">&rsaquo;</span>
            </div>
            <div class="sb-sub-list">
                <button type="button" class="sb-sub-item" data-flx-bind="Action" value="ACTION_ORDERSELECTION">Selecao
                    de
                    Ordem</button>
                <button type="button" class="sb-sub-item" data-flx-bind="Action"
                    value="ACTION_CHECKLIST">Checklist</button>
                <button type="button" class="sb-sub-item" data-flx-bind="Action" value="TESTE_COCKPIT"> TESTE Cockpit de
                    Pesagem</button>
            </div>
        </div>

        <!-- ===== MODULO: FABRICACAO ===== -->
        <div class="sb-module" data-mod="mod-fab">
            <div class="sb-module-btn" data-toggle="mod-fab" role="button" tabindex="0">
                <div class="sb-dot"></div>
                <span class="sb-ico">&#129514;</span> Fabricacao
                <span class="sb-arr">&rsaquo;</span>
            </div>
            <div class="sb-sub-list">
                <button type="button" class="sb-sub-item" data-flx-bind="Action" value="fab-ordens">1. Selecao de
                    Ordens</button>
            </div>
        </div>

        <!-- ===== MODULO: RELATORIOS ===== -->
        <div class="sb-module" data-mod="mod-rel">
            <div class="sb-module-btn" data-toggle="mod-rel" role="button" tabindex="0">
                <div class="sb-dot"></div>
                <span class="sb-ico">&#128200;</span> Relatorios
                <span class="sb-arr">&rsaquo;</span>
            </div>
            <div class="sb-sub-list">
                <button type="button" class="sb-sub-item" data-flx-bind="Action" value="rel-oee">OEE Dashboard</button>
            </div>
        </div>

        <!-- ===== MODULO: DEV TOOLS ===== -->
        <div class="sb-module" data-mod="mod-dev-tools">
            <div class="sb-module-btn" data-toggle="mod-dev-tools" role="button" tabindex="0">
                <div class="sb-dot"></div>
                <span class="sb-ico">&#128736;</span> Dev Tools
                <span class="sb-arr">&rsaquo;</span>
            </div>
            <div class="sb-sub-list">
                <button type="button" class="sb-sub-item" data-flx-bind="Action" value="DEV_TOOLS_ALL_COMPONENTS">All
                    Components</button>
                <button type="button" class="sb-sub-item" data-flx-bind="Action"
                    value="DEV_TOOLS_DOCUMENTATION">Documentation</button>
            </div>
        </div>

    </nav>

    <!-- ============ FOOTER ============ -->
    <div class="sb-footer">
        <div class="sb-clock">--:--:--</div>
        <div class="sb-date">--</div>
    </div>

</aside>

<script>
    (function () {
        function init() {

            console.log("CONTEXT:" + $Context.inputs);
            if (typeof $Context !== 'undefined') {
                window.AprisoContext = $Context;
            }

            [...document.fonts].forEach(f =>
                console.log(f)
            );

            initSidebarEvents();

        }
        // Garante que so roda depois do DOM montado
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();

</script>
