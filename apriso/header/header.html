<header class="topbar">

    <!-- ============ MENU (mobile) ============ -->
    <button type="button" class="tb-hamburger" aria-label="Abrir menu">
        <span class="tb-hamburger-bar"></span>
        <span class="tb-hamburger-bar"></span>
        <span class="tb-hamburger-bar"></span>
    </button>

    <!-- ============ BREADCRUMB ============ -->
    <div class="topbar-breadcrumb">
        <button type="button" class="tb-home" data-flx-bind="Action" value="OPEN_HOME">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 12 12 3l9 9" />
                <path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10" />
            </svg>
            <span class="tb-home__label">MES Apriso</span>
        </button>
        <span class="tb-sep" aria-hidden="true">&rsaquo;</span>
        <strong class="tb-page">{ScreenTitle}</strong>
    </div>

    <!-- ============ RIGHT ============ -->
    <div class="topbar-right">

        <div class="tb-pill ok">&#9679; Sistema Online</div>

        <button type="button" class="tb-btn-andon" data-flx-bind="Action" value="OPEN_ANDON"
            title="Cadeia de Ajuda Autonoma">
            &#128680; Pedir Ajuda
        </button>

        <button type="button" class="tb-btn" data-flx-bind="Action" value="OPEN_TRACTIAN">
            + Solicitacao Servico
        </button>

    </div>

    <!-- Badge Granado — visível apenas no mobile (mesmo padrão da aplicação) -->
    <span class="tb-logo-mobile"><span class="tb-logo-mark">G</span>GRANADO</span>

</header>

<script>
    (function () {

        function init() {

            // Decisão mobile/web feita UMA vez no load (classe no <html>).
            if (window.innerWidth <= 768) {
                document.documentElement.classList.add('is-granado-mobile');
            }

            initHeaderEvents();

        }
        // Garante que so roda depois do DOM montado
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>
